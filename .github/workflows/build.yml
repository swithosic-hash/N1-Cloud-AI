name: N1 Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt update && sudo apt install -y git curl wget

      - name: Clone repo
        run: git clone https://github.com/ophub/amlogic-s9xxx-openwrt.git openwrt

      - name: Build
        run: |
          cd openwrt
          bash build.sh

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: openwrt/out/
