name: N1 eSports Pro Ultimate Build

on:
  workflow_dispatch:

env:
  DEVICE: s905x-n1
  TARGET: immortalwrt-23.05
  PROFILE: s905x

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      # -----------------------
      # 1. Checkout repo
      # -----------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------
      # 2. Install dependencies
      # -----------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git curl wget unzip build-essential \
            libncurses5-dev zlib1g-dev gawk flex gettext libssl-dev rsync iptables tc

      # -----------------------
      # 3. Clone OpenWrt repo
      # -----------------------
      - name: Clone OpenWrt
        run: |
          git clone --depth 1 https://github.com/ophub/amlogic-s9xxx-openwrt.git openwrt
          cd openwrt

      # -----------------------
      # 4. Inject Ultimate Pro eSports Config
      # -----------------------
      - name: Inject Ultimate Pro eSports Config
        run: |
          cat > openwrt/user_config.sh <<'EOF'
#!/bin/bash

# ==============================
# 🎮 N1 职业电竞极限优化
# ==============================

DEVICE=s905x-n1
TARGET=immortalwrt-23.05
PROFILE=s905x

# ---- 核心插件 ----
PACKAGES="
luci
luci-base
luci-app-openclash
luci-app-adguardhome
dnsmasq-full
ipset
ip-full
kmod-tun
kmod-ipt-conntrack
kmod-nf-nathelper-extra
kmod-ipt-nathelper
bash
coreutils-nohup
curl
ca-certificates
"

# ---- 旁路由网络 ----
DEFAULT_LAN_IP=192.168.1.2
DISABLE_DHCP=1
DISABLE_IPV6=1
ROUTER_MODE=bridge
DNS_PRIMARY=127.0.0.1
DNS_SECONDARY=223.5.5.5
DNS_CACHE=1

# ---- 千兆 & 游戏性能 ----
NETWORK_OFFLOAD=1
FLOW_OFFLOAD=1
CONNTRACK_MAX=524288
TCP_FASTOPEN=1

# ---- OpenClash 电竞模式 + 自动节点切换 ----
OPENCLASH_CORE=mihomo
OPENCLASH_MODE=tun
OPENCLASH_DNS=fake-ip
OPENCLASH_AUTO_START=1
OPENCLASH_DNS_HIJACK=1
OPENCLASH_UDP_OPTIMIZED=1
OPENCLASH_GAMING_MODE=1
OPENCLASH_URL_TEST_INTERVAL=180
OPENCLASH_URL_TEST_TOLERANCE=5

# ---- AdGuardHome 全屋去广告 ----
ADGUARD_ENABLE=1
ADGUARD_PORT=3000
ADGUARD_DNS_PORT=53
ADGUARD_BLOCK_ADS=1
ADGUARD_BLOCK_MALWARE=1
ADGUARD_CACHE_ENABLE=1

# ---- UDP游戏高优先级队列 ----
cat <<EOT > /etc/udp_qos.sh
#!/bin/sh
iptables -t mangle -A PREROUTING -p udp -m multiport --dports 3074,27015,27036,5000:6000 -j DSCP --set-dscp-class EF
tc qdisc add dev eth0 root handle 1: htb default 20
tc class add dev eth0 parent 1: classid 1:1 htb rate 1000mbit ceil 1000mbit prio 1
tc filter add dev eth0 protocol ip parent 1:0 prio 1 handle 1 fw flowid 1:1
EOT
chmod +x /etc/udp_qos.sh
/etc/udp_qos.sh

# ---- TCP/UDP缓冲优化（防抖动） ----
sysctl -w net.core.rmem_max=26214400
sysctl -w net.core.wmem_max=26214400
sysctl -w net.ipv4.tcp_rmem="4096 87380 26214400"
sysctl -w net.ipv4.tcp_wmem="4096 65536 26214400"

# ---- CPU核心亲和 & 优先级 ----
taskset -c 0-1 /usr/bin/openclash >/dev/null 2>&1 &
renice -n -10 -p $(pidof openclash)

EOF

      # -----------------------
      # 5. Build firmware
      # -----------------------
      - name: Build firmware
        run: |
          cd openwrt
          bash build.sh

      # -----------------------
      # 6. Upload firmware artifact
      # -----------------------
      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: N1-eSports-Pro-Ultimate-Firmware
          path: openwrt/out/
